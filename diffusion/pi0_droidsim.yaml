policy_config:
  autoclass: examples.pi0.pi0.PizeroPolicy
  model_config:
    model_id: pi0_fast_droid_jointpos
    checkpoint_dir: s3://openpi-assets-simeval/pi0_fast_droid_jointpos
  action_space: joint_positions
  flip_gripper: False

runner_config:
  autoclass: robot_inference.client.isaaclab_episode_runner.IsaacLabEpisodeRunner
  env_config:
    ip: localhost
    port: 5556
    raise_on_server_error: True
    min_period: 0.0
  recorder_config:
    rerun_enabled: False
    video_enabled: True
    output_path: /home/$USER/experiments/droidsim/pi0
    fps: 5
